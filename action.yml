name: "Build iOS app"

# on: [push]
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-15
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Select best Xcode version
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep -i xcode
          echo "================================="

          # Try Xcode 26.x first (needed for Godot 4.7 export templates)
          SELECTED=""
          for xc in /Applications/Xcode_26*.app; do
            if [ -d "$xc/Contents/Developer" ]; then
              SELECTED="$xc/Contents/Developer"
              break
            fi
          done

          # Fallback to Xcode 16.x
          if [ -z "$SELECTED" ]; then
            for xc in /Applications/Xcode_16*.app; do
              if [ -d "$xc/Contents/Developer" ]; then
                SELECTED="$xc/Contents/Developer"
              fi
            done
          fi

          if [ -n "$SELECTED" ]; then
            echo "Selecting: $SELECTED"
            sudo xcode-select -s "$SELECTED"
          else
            echo "No suitable Xcode found, using default."
          fi

          echo "=== Active Xcode ==="
          xcodebuild -version
          echo "===================="

      - name: build archive and ipaify
        run: |
          wget -O archive.zip "YOURLINKHERE"
          unzip archive.zip -d .

          xcodebuild archive -project Example-Project.xcodeproj -scheme 'Example-Project' -archivePath Example-Project.xcarchive -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

          mkdir Payload
          mv Example-Project.xcarchive/Products/Applications/Example-Project.app Payload/Example-Project.app

          zip -r "Example-Project.ipa" "Payload"

          mv Example-Project.ipa ${{ runner.temp }}/Example-Project.ipa


      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: Example-Project
          path: ${{ runner.temp }}/Example-Project.ipa
          # you can also archive the entire directory
          # path: ${{ runner.temp }}/build
          retention-days: 3