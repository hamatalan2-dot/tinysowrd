name: "Build iOS app"

# on: [push]
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-15
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Select best Xcode version
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep -i xcode
          echo "================================="

          # Try Xcode 26.x first (needed for Godot 4.7 export templates)
          SELECTED=""
          for xc in /Applications/Xcode_26*.app; do
            if [ -d "$xc/Contents/Developer" ]; then
              SELECTED="$xc/Contents/Developer"
              break
            fi
          done

          # Fallback to Xcode 16.x
          if [ -z "$SELECTED" ]; then
            for xc in /Applications/Xcode_16*.app; do
              if [ -d "$xc/Contents/Developer" ]; then
                SELECTED="$xc/Contents/Developer"
              fi
            done
          fi

          if [ -n "$SELECTED" ]; then
            echo "Selecting: $SELECTED"
            sudo xcode-select -s "$SELECTED"
          else
            echo "No suitable Xcode found, using default."
          fi

          echo "=== Active Xcode ==="
          xcodebuild -version
          echo "===================="

      - name: build archive and ipaify
        run: |
          wget -O archive.zip "https://www.dropbox.com/scl/fi/7om0hst2a13087x8ao4jk/989849e1-6cbe-11f1-9e1b-5cea1d8ad0e4.zip?rlkey=292dbgpb8og79nnmzlxhebvrb&dl=1"
          unzip archive.zip -d .

          xcodebuild archive -project tinysowrd.xcodeproj -scheme 'tinysowrd' -archivePath tinysowrd.xcarchive -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

          mkdir Payload
          mv tinysowrd.xcarchive/Products/Applications/tinysowrd.app Payload/tinysowrd.app

          zip -r "tinysowrd.ipa" "Payload"

          mv tinysowrd.ipa ${{ runner.temp }}/tinysowrd.ipa


      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: tinysowrd
          path: ${{ runner.temp }}/tinysowrd.ipa
          # you can also archive the entire directory
          # path: ${{ runner.temp }}/build
          retention-days: 3